<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Crear plan </title>
</head>
<body class="bg-slate-100 p-6">
    <form action="{{ url_for('main.crear') }}" method="POST" enctype="multipart/form-data" class="max-w-5xl mx-auto bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-200">
        
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-4xl font-black text-slate-800 italic uppercase text-center">Configurar <span class="text-blue-600">Plan</span></h1>
            <a href="{{ url_for('main.index') }}" class="text-slate-400 font-bold hover:text-red-500 transition text-sm">CANCELAR</a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10 p-8 bg-slate-50 rounded-3xl">
            <div>
                <label class="block font-black text-slate-700 mb-2 uppercase text-xs">Título del Plan</label>
                <input type="text" name="titulo" class="w-full p-4 rounded-2xl border-2 border-slate-200 focus:border-blue-500 outline-none" placeholder="Ej: Hipertrofia Avanzada" required>
            </div>
            <div>
                <label class="block font-black text-slate-700 mb-2 uppercase text-xs">Imagen (Card)</label>
                <input type="file" name="imagen_portada" accept="image/*" class="w-full p-3 bg-white rounded-2xl border-2 border-dashed border-slate-300">
            </div>
        </div>

        <div class="mb-12">
            <h2 class="text-xl font-black text-slate-800 mb-4 uppercase italic">Bloques de Descripción</h2>
            <div id="contenedor-secciones" class="space-y-3">
                <textarea name="seccion_texto[]" rows="2" class="w-full p-4 rounded-2xl border-2 border-slate-200 outline-none" placeholder="Añade instrucciones generales..."></textarea>
            </div>
            <button type="button" onclick="agregarSeccion()" class="mt-4 text-blue-600 font-bold text-sm hover:underline">+ AÑADIR BLOQUE</button>
        </div>

        <div id="contenedor-tablas" class="space-y-8">
            <div class="tabla-dia bg-slate-50 p-6 rounded-[2rem] border border-slate-200">
                <input type="hidden" name="ej_por_tabla[]" value="1" class="contador-ejercicios">
                <input type="text" name="nombre_dia[]" placeholder="Nombre del Día (Ej: Lunes - Pecho)" class="w-full p-4 mb-4 rounded-xl border-b-4 border-slate-200 font-black uppercase text-xl outline-none bg-transparent">
                
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-[10px] uppercase text-slate-400">
                            <th>Ejercicio</th>
                            <th class="text-center">Sets</th>
                            <th class="text-center">Reps</th>
                            <th class="text-center">Descanso</th>
                            <th>Video</th>
                        </tr>
                    </thead>
                    <tbody class="cuerpo-tabla">
                        <tr>
                            <td class="p-2"><input type="text" name="ej_nombre[]" class="w-full p-2 rounded-lg border"></td>
                            <td class="p-2"><input type="number" name="ej_series[]" class="w-16 p-2 rounded-lg border text-center"></td>
                            <td class="p-2"><input type="number" name="ej_reps[]" class="w-16 p-2 rounded-lg border text-center"></td>
                            <td class="p-2"><input type="number" name="ej_descanso[]" class="w-16 p-2 rounded-lg border text-center"></td>
                            <td class="p-2"><input type="file" name="ej_video[]" class="text-[10px]"></td>
                        </tr>
                    </tbody>
                </table>
                <button type="button" onclick="agregarFila(this)" class="mt-4 text-xs font-bold text-slate-500 uppercase">+ Ejercicio</button>
            </div>
        </div>

        <div class="flex gap-4 mt-12">
            <button type="button" onclick="agregarTabla()" class="flex-grow bg-slate-800 text-white py-4 rounded-2xl font-black uppercase">Nuevo Día</button>
            <button type="submit" class="flex-grow bg-blue-600 text-white py-4 rounded-2xl font-black uppercase">Guardar Plan</button>
        </div>
    </form>

    <script>
        function agregarSeccion() {
            const div = document.createElement('div');
            div.innerHTML = `<textarea name="seccion_texto[]" rows="2" class="w-full p-4 mt-2 rounded-2xl border-2 border-slate-200 outline-none" placeholder="Más detalles..."></textarea>`;
            document.getElementById('contenedor-secciones').appendChild(div);
        }

        function agregarFila(btn) {
            const tbody = btn.closest('.tabla-dia').querySelector('.cuerpo-tabla');
            const cont = btn.closest('.tabla-dia').querySelector('.contador-ejercicios');
            const fila = tbody.insertRow();
            fila.innerHTML = `
                <td class="p-2"><input type="text" name="ej_nombre[]" class="w-full p-2 rounded-lg border"></td>
                <td class="p-2"><input type="number" name="ej_series[]" class="w-16 p-2 rounded-lg border text-center"></td>
                <td class="p-2"><input type="number" name="ej_reps[]" class="w-16 p-2 rounded-lg border text-center"></td>
                <td class="p-2"><input type="number" name="ej_descanso[]" class="w-16 p-2 rounded-lg border text-center"></td>
                <td class="p-2"><input type="file" name="ej_video[]" class="text-[10px]"></td>
            `;
            cont.value = parseInt(cont.value) + 1;
        }

        function agregarTabla() {
            const container = document.getElementById('contenedor-tablas');
            const clon = document.querySelector('.tabla-dia').cloneNode(true);
            clon.querySelector('input[name="nombre_dia[]"]').value = "";
            clon.querySelector('.contador-ejercicios').value = "1";
            clon.querySelector('.cuerpo-tabla').innerHTML = clon.querySelector('.cuerpo-tabla').rows[0].outerHTML;
            container.appendChild(clon);
        }
    </script>
</body>
</html>
