<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Registro - Gym Master</title>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-6">
    <form action="{{ url_for('auth.register') }}" method="POST" class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md text-center">
        <h1 class="text-3xl font-black italic uppercase mb-6 text-slate-800">Crea tu <span class="text-blue-600">Cuenta</span></h1>
        
        <div class="space-y-4">
            <input type="text" name="nombre" placeholder="Nombre completo" class="w-full p-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-blue-500 transition" required>
            <input type="email" name="email" placeholder="Correo electrónico" class="w-full p-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-blue-500 transition" required>
            <input type="text" name="telefono" placeholder="Teléfono" class="w-full p-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-blue-500 transition" required>
            <input type="password" name="password" placeholder="Contraseña" class="w-full p-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-blue-500 transition" required>
        </div>

        <button type="submit" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-black uppercase mt-8 hover:bg-slate-700 transition">Registrarme</button>
        
        <div class="mt-6">
            <a href="{{ url_for('auth.login') }}" class="text-xs text-slate-400 font-bold hover:text-blue-600 uppercase tracking-widest">¿Ya tienes cuenta? Inicia sesión</a>
        </div>
    </form>
</body>
</html>
