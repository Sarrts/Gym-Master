<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Login - Gym Master</title>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-6">
    
    <div class="w-full max-w-md">
        <form action="{{ url_for('auth.login') }}" method="POST" class="bg-white p-10 rounded-[2.5rem] shadow-2xl text-center border-t-8 border-blue-600">
            
            <h1 class="text-4xl font-black italic uppercase mb-2 text-slate-800">
                Gym <span class="text-blue-600">Master</span>
            </h1>
            <p class="text-slate-400 font-bold uppercase text-[10px] tracking-[0.2em] mb-8">Acceso de Ingeniería</p>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="bg-red-50 text-red-500 p-3 rounded-xl mb-4 text-xs font-bold uppercase">
                    {{ message }}
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <div class="space-y-4">
                <div class="relative">
                    <input type="email" name="email" placeholder="Email del Atleta" 
                        class="w-full p-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-blue-500 focus:bg-blue-50/30 transition-all font-medium" required>
                </div>
                
                <div class="relative">
                    <input type="password" name="password" placeholder="Contraseña" 
                        class="w-full p-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-blue-500 focus:bg-blue-50/30 transition-all font-medium" required>
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase mt-8 hover:bg-blue-700 hover:shadow-lg hover:shadow-blue-200 transition-all transform active:scale-95">
                Iniciar Sesión
            </button>
            
            <div class="mt-8 pt-6 border-t border-slate-100">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-tight">
                    ¿No tienes acceso? 
                    <a href="{{ url_for('auth.register') }}" class="text-blue-600 hover:underline">Crea una cuenta</a>
                </p>
            </div>
        </form>

        
    </div>

</body>
</html>
